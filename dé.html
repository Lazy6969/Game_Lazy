<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 Jeu de Dé</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow-y: auto;
            padding: 0; /* Supprime le padding du body */
        }

        /* ===== PARTICULES DE FOND ===== */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* ===== CONTENEUR PRINCIPAL ===== */
        .game-container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%; /* Utilise toute la largeur disponible */
            max-width: 100%; /* S'assure qu'il ne dépasse pas 100% */
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }

        .game-container {
            width: 800px;
            max-width: 95vw;
        }
        .game-container h1 { /* Cibler spécifiquement le h1 à l'intérieur du conteneur */
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 8px;
            background: linear-gradient(to right, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ===== ZONE DU DÉ ===== */
        .dice-area {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 160px;
            margin-bottom: 30px;
        }

        .dice {
            width: 110px;
            height: 110px;
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            border-radius: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 16px;
            gap: 4px;
            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.4),
                inset 0 2px 4px rgba(255, 255, 255, 0.8);
            transition: transform 0.1s;
            position: relative;
        }

        .dice.rolling {
            animation: diceRoll 0.6s ease-out;
        }

        @keyframes diceRoll {
            0%   { transform: rotateX(0deg) rotateY(0deg) scale(1); }
            20%  { transform: rotateX(180deg) rotateY(90deg) scale(0.8); }
            40%  { transform: rotateX(360deg) rotateY(180deg) scale(1.1); }
            60%  { transform: rotateX(540deg) rotateY(270deg) scale(0.9); }
            80%  { transform: rotateX(680deg) rotateY(340deg) scale(1.05); }
            100% { transform: rotateX(720deg) rotateY(360deg) scale(1); }
        }

        .dot {
            width: 100%;
            height: 100%;
            background: transparent;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .dot.active {
            background: radial-gradient(circle, #302b63, #1a1740);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* ===== SECTION JOUEURS ===== */
        .players-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 16px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .player-card.disabled {
            opacity: 0.4;
            filter: grayscale(1);
        }

        .player-card.disabled .input-group,
        .player-card.disabled .name-input {
            pointer-events: none;
        }

        .player-card.active {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
        }

        .player-name {
             font-weight: bold;
             color: #ffd200;
             margin-bottom: 10px;
             display: flex;
             justify-content: space-between;
             align-items: center;
        }

        .name-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffd200;
            font-weight: bold;
            font-size: 0.95rem;
            width: 140px;
            outline: none;
            transition: border-color 0.3s;
            padding-bottom: 2px;
            cursor: edit;
        }

        .name-input:hover {
            border-bottom-color: rgba(255, 210, 0, 0.5);
        }

        .name-input:focus {
            border-bottom-color: #ffd200;
        }

        .toggle-btn {
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            pointer-events: auto;
        }

        .toggle-btn.off {
            background: #ff4757;
            border-color: #ff4757;
        }

        .random-btn {
            background: rgba(255, 210, 0, 0.2);
            border: 1px solid #ffd200;
            color: #ffd200;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-left: 5px;
        }

        .random-btn:hover {
            background: #ffd200;
            color: #000;
        }

        .input-group {
            margin-bottom: 8px;
        }

        .input-group label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            display: block;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            outline: none;
        }

        .select-row {
            display: flex;
            gap: 5px;
        }

        /* ===== BOUTON LANCER ===== */
        .roll-btn {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            color: #1a1740;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.25);
        }

        .roll-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(0, 255, 136, 0.4);
        }

        /* ===== TABLEAU STATISTIQUES ===== */
        .stats-section {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stats-section h3 {
            margin-bottom: 15px;
            color: #ffd200;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .stats-table th {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            padding: 10px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }

        .stats-table td {
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
        }

        .net-positive { color: #2ed573; font-weight: bold; }
        .net-negative { color: #ff4757; font-weight: bold; }
        .net-neutral { color: #fff; }

        .reset-btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid #ff4757;
            color: #ff4757;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .reset-btn:hover {
            background: #ff4757;
            color: white;
        }

        /* ===== HISTORIQUE ===== */
        .history {
            margin-top: 25px;
            max-height: 120px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 14px;
            border-radius: 8px;
            margin-bottom: 4px;
            font-size: 0.8rem;
            animation: slideIn 0.3s ease-out;
        }

        .history-item.win {
            background: rgba(46, 213, 115, 0.1);
            border-left: 3px solid #2ed573;
        }

        .history-item.lose {
            background: rgba(255, 71, 87, 0.1);
            border-left: 3px solid #ff4757;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ===== OVERLAY / POPUP ===== */
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .popup {
            background: rgba(30, 27, 70, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 50px;
            text-align: center;
            transform: scale(0.7) translateY(30px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
            max-width: 90vw;
            min-width: 320px;
        }

        .overlay.active .popup {
            transform: scale(1) translateY(0);
        }

        .results-list {
            text-align: left;
            margin: 20px 0;
            margin-bottom: 10px;
        }

        .popup h2 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .res-item {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .close-btn {
            padding: 12px 40px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: transparent;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .back-home {
            display: inline-block;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .back-home:hover { color: #00d4ff; }

        /* ===== CONFETTI ===== */
        .confetti-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .confetti-piece {
            position: absolute;
            top: -20px;
            width: 10px;
            height: 20px;
            border-radius: 3px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotateZ(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotateZ(720deg); opacity: 0; }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .game-container { padding: 25px 20px; }
            h1 { font-size: 1.6rem; }
            .dice { width: 90px; height: 90px; padding: 12px; }
            .players-grid { grid-template-columns: 1fr; }
            .popup { padding: 30px; }
        }
    </style>
</head>
<body>

    <!-- PARTICULES DE FOND -->
    <div class="particles" id="particles"></div>

    <!-- CONFETTI CONTAINER -->
    <div class="confetti-container" id="confetti"></div>

    <!-- CONTENEUR PRINCIPAL -->
    <div class="game-container">
        <a href="index.html" class="back-home">← Retour à l'accueil</a>
        <h1>🎲 Jeu de Dé</h1>
        <p style="text-align:center; color:rgba(255,255,255,0.6); margin-bottom:20px;">Misez sur le bon chiffre et gagnez ! (Mise min: 500 Ar)</p>

        <!-- JOUEURS -->
        <div class="players-grid">
            <!-- Joueur 1 -->
            <div class="player-card" id="card-0">
                <div class="player-name">
                    <span><input type="text" id="name-0" value="Joueur 1" class="name-input" oninput="updateUI()" maxlength="15"></span>
                    <button class="toggle-btn" onclick="togglePlayer(0)" id="tgl-0">Connecté</button>
                </div>
                <div class="input-group">
                    <label>Chiffre choisi (1-6)</label>
                    <div class="select-row">
                        <select id="num-0">
                            <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                            <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                        </select>
                        <button class="random-btn" onclick="randomPick(0)">🎲</button>
                    </div>
                </div>
                <div class="input-group">
                    <label>Mise (Ar)</label>
                    <input type="number" id="bet-0" placeholder="0" min="500">
                </div>
            </div>
            <!-- Joueur 2 -->
            <div class="player-card" id="card-1">
                <div class="player-name">
                    <span><input type="text" id="name-1" value="Joueur 2" class="name-input" oninput="updateUI()" maxlength="15"></span>
                    <button class="toggle-btn" onclick="togglePlayer(1)" id="tgl-1">Connecté</button>
                </div>
                <div class="input-group">
                    <label>Chiffre choisi (1-6)</label>
                    <div class="select-row">
                        <select id="num-1">
                            <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                            <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                        </select>
                        <button class="random-btn" onclick="randomPick(1)">🎲</button>
                    </div>
                </div>
                <div class="input-group">
                    <label>Mise (Ar)</label>
                    <input type="number" id="bet-1" placeholder="0" min="500">
                </div>
            </div>
            <!-- Joueur 3 -->
            <div class="player-card" id="card-2">
                <div class="player-name">
                    <span><input type="text" id="name-2" value="Joueur 3" class="name-input" oninput="updateUI()" maxlength="15"></span>
                    <button class="toggle-btn" onclick="togglePlayer(2)" id="tgl-2">Connecté</button>
                </div>
                <div class="input-group">
                    <label>Chiffre choisi (1-6)</label>
                    <div class="select-row">
                        <select id="num-2">
                            <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                            <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                        </select>
                        <button class="random-btn" onclick="randomPick(2)">🎲</button>
                    </div>
                </div>
                <div class="input-group">
                    <label>Mise (Ar)</label>
                    <input type="number" id="bet-2" placeholder="0" min="500">
                </div>
            </div>
        </div>

        <!-- ZONE DU DÉ -->
        <div class="dice-area">
            <div class="dice" id="dice">
                <div class="dot" id="d1"></div>
                <div class="dot" id="d2"></div>
                <div class="dot" id="d3"></div>
                <div class="dot" id="d4"></div>
                <div class="dot" id="d5"></div>
                <div class="dot" id="d6"></div>
                <div class="dot" id="d7"></div>
                <div class="dot" id="d8"></div>
                <div class="dot" id="d9"></div>
            </div>
        </div>

        <!-- BOUTON -->
        <button class="roll-btn" id="rollBtn" onclick="rollDice()">
            🎲 Lancer le Dé
        </button>

        <!-- HISTORIQUE -->
        <div class="history" id="history"></div>

        <!-- TABLEAU STATISTIQUES POUR CAISSIER -->
        <div class="stats-section">
            <h3>📊 Bilan Caissier</h3>
            <table class="stats-table">
                <thead>
                    <tr>
                        <th>Joueur</th>
                        <th>Total Misé</th>
                        <th>Gagné (+)</th>
                        <th>Perdu (-)</th>
                        <th>Bilan Net (À payer)</th>
                    </tr>
                </thead>
                <tbody id="stats-body">
                </tbody>
            </table>
            <button class="reset-btn" onclick="resetAll()">Réinitialiser toutes les statistiques</button>
        </div>
    </div>

    <!-- POPUP RÉSULTAT -->
    <div class="overlay" id="overlay" onclick="closePopup(event)">
        <div class="popup" id="popup">
            <h2>Résultat du Dé : <span id="res-dice" style="color:#ffd200;">?</span></h2>
            <div class="results-list" id="resultsList"></div>
            <button class="close-btn" onclick="closePopup()">Fermer</button>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const MIN_BET = 500;
        let players = [
            { active: true, totalMise: 0, wins: 0, losses: 0, net: 0, totalGains: 0, totalPertes: 0 },
            { active: true, totalMise: 0, wins: 0, losses: 0, net: 0, totalGains: 0, totalPertes: 0 },
            { active: true, totalMise: 0, wins: 0, losses: 0, net: 0, totalGains: 0, totalPertes: 0 }
        ];
        let isRolling = false;

        // ===== MAPPING DES POINTS DU DÉ =====
        // Grille 3x3 : positions 1-9
        // d1 d2 d3
        // d4 d5 d6
        // d7 d8 d9
        const DICE_FACES = {
            1: [5],
            2: [3, 7],
            3: [3, 5, 7],
            4: [1, 3, 7, 9],
            5: [1, 3, 5, 7, 9],
            6: [1, 3, 4, 6, 7, 9]
        };

        // ===== INITIALISATION =====
        function init() {
            createParticles();
            setDiceFace(1);
            updateUI();
        }

        // ===== PARTICULES DE FOND =====
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 8 + 5) + 's';
                p.style.animationDelay = (Math.random() * 10) + 's';
                p.style.width = p.style.height = (Math.random() * 4 + 2) + 'px';
                container.appendChild(p);
            }
        }

        // ===== AFFICHER UNE FACE DU DÉ =====
        function setDiceFace(face) {
            // Reset all dots
            for (let i = 1; i <= 9; i++) {
                document.getElementById('d' + i).classList.remove('active');
            }
            // Activate dots for this face
            DICE_FACES[face].forEach(pos => {
                document.getElementById('d' + pos).classList.add('active');
            });
        }

        // ===== TOGGLE PLAYER =====
        function togglePlayer(id) {
            players[id].active = !players[id].active;
            const card = document.getElementById(`card-${id}`);
            const btn = document.getElementById(`tgl-${id}`);
            
            if (players[id].active) {
                card.classList.remove('disabled');
                btn.textContent = 'Connecté';
                btn.classList.remove('off');
            } else {
                card.classList.add('disabled');
                btn.textContent = 'Déconnecté';
                btn.classList.add('off');
            }
        }

        // ===== RANDOM PICK =====
        function randomPick(id) {
            const select = document.getElementById(`num-${id}`);
            const randomVal = Math.floor(Math.random() * 6) + 1;
            select.value = randomVal;
            
            // Animation visuelle rapide
            select.style.background = '#ffd200';
            select.style.color = '#000';
            setTimeout(() => {
                select.style.background = '';
                select.style.color = '';
            }, 200);
        }

        // ===== LANCER LE DÉ =====
        function rollDice() {
            if (isRolling) return;

            let activeBets = [];
            
            // Validation des mises
            for(let i=0; i<3; i++) {
                if (!players[i].active) continue;

                const betVal = parseInt(document.getElementById(`bet-${i}`).value) || 0;
                const numVal = parseInt(document.getElementById(`num-${i}`).value);
                const playerName = document.getElementById(`name-${i}`).value || `Joueur ${i+1}`;
                
                if (betVal > 0) {
                    if (betVal < MIN_BET) {
                        alert(`${playerName}: La mise minimale est de ${MIN_BET} Ar`);
                        return;
                    }
                    activeBets.push({ id: i, bet: betVal, pick: numVal });
                }
            }

            if (activeBets.length === 0) {
                alert("Veuillez saisir au moins une mise.");
                return;
            }

            isRolling = true;
            document.getElementById('rollBtn').disabled = true;
            const dice = document.getElementById('dice');

            // Animation du dé
            dice.classList.add('rolling');

            // Simuler des faces aléatoires pendant l'animation
            let shuffleCount = 0;
            const shuffleInterval = setInterval(() => {
                const randomFace = Math.floor(Math.random() * 6) + 1;
                setDiceFace(randomFace);
                shuffleCount++;
                if (shuffleCount > 10) {
                    clearInterval(shuffleInterval);
                }
            }, 60);

            // Résultat final après l'animation
            setTimeout(() => {
                dice.classList.remove('rolling');

                // Résultat équitable
                const result = Math.floor(Math.random() * 6) + 1;
                setDiceFace(result);
                
                let playerResults = [];
                let hasAnyWin = false;

                activeBets.forEach(play => {
                    const isWin = (play.pick === result);
                    players[play.id].totalMise += play.bet;
                    
                    if (isWin) {
                        players[play.id].wins++;
                        const gain = play.bet * 2;
                        players[play.id].totalGains += gain;
                        players[play.id].net += play.bet;
                        hasAnyWin = true;
                    } else {
                        players[play.id].losses++;
                        players[play.id].totalPertes += play.bet;
                        players[play.id].net -= play.bet;
                    }
                    playerResults.push({ id: play.id, isWin, amount: play.bet });
                    addHistory(play.id, result, isWin, play.bet);
                });

                if (hasAnyWin) {
                    launchConfetti();
                }

                showPopup(result, playerResults);
                updateUI();
                
                document.getElementById('rollBtn').disabled = false;
                isRolling = false;
            }, 800);
        }

        // ===== RÉSULTAT PONDÉRÉ (plus de chances de perdre) =====
        function generateWeightedResult() {
            // 33.3% chance de gagner (faces 5,6)
            // 66.7% chance de perdre (faces 1,2,3,4)
            const rand = Math.random() * 100;

            if (rand < 33.3) {
                // Victoire : retourne 5 ou 6
                return WIN_FACES[Math.floor(Math.random() * WIN_FACES.length)];
            } else {
                // Défaite : retourne 1, 2, 3 ou 4
                const loseFaces = [1, 2, 3, 4];
                return loseFaces[Math.floor(Math.random() * loseFaces.length)];
            }
        }

        // ===== POPUP =====
        function showPopup(result, results) {
            document.getElementById('res-dice').textContent = result;
            const list = document.getElementById('resultsList');
            list.innerHTML = '';

            results.forEach(res => {
                const div = document.createElement('div');
                div.className = 'res-item';
                const name = document.getElementById(`name-${res.id}`).value || `Joueur ${res.id + 1}`;
                div.innerHTML = `
                    <strong>${name}:</strong> 
                    ${res.isWin ? `<span style="color:#2ed573;">GAGNÉ (+${res.amount * 2} Ar)</span>` : `<span style="color:#ff4757;">PERDU (-${res.amount} Ar)</span>`}
                `;
                list.appendChild(div);
            });

            document.getElementById('overlay').classList.add('active');
        }

        function closePopup(event) {
            if (event && event.target !== event.currentTarget && !event.target.classList.contains('close-btn')) return;
            document.getElementById('overlay').classList.remove('active');
        }

        // ===== CONFETTI =====
        function launchConfetti() {
            const container = document.getElementById('confetti');
            container.innerHTML = '';
            const colors = ['#ffd200', '#f7971e', '#2ed573', '#7bed9f', '#ff6b81', '#70a1ff', '#fff'];

            for (let i = 0; i < 60; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                piece.style.animationDelay = (Math.random() * 0.5) + 's';
                piece.style.width = (Math.random() * 8 + 5) + 'px';
                piece.style.height = (Math.random() * 12 + 8) + 'px';
                container.appendChild(piece);
            }

            setTimeout(() => { container.innerHTML = ''; }, 4000);
        }

        // ===== UPDATE UI =====
        function updateUI() {
            const statsBody = document.getElementById('stats-body');
            statsBody.innerHTML = '';

            for(let i=0; i<3; i++) {
                const p = players[i];
                const row = document.createElement('tr');
                const netClass = p.net > 0 ? 'net-positive' : (p.net < 0 ? 'net-negative' : 'net-neutral');
                const netSymbol = p.net > 0 ? '+' : '';
                const name = document.getElementById(`name-${i}`).value || `Joueur ${i+1}`;
                
                row.innerHTML = `
                    <td>${name}</td>
                    <td>${p.totalMise} Ar</td>
                    <td style="color:#2ed573;">+${p.totalGains} Ar</td>
                    <td style="color:#ff4757;">-${p.totalPertes} Ar</td>
                    <td class="${netClass}">${netSymbol}${p.net} Ar</td>
                `;
                statsBody.appendChild(row);
            }
        }

        // ===== RESET ALL =====
        function resetAll() {
            if (!confirm("Voulez-vous vraiment réinitialiser toutes les statistiques et les mises ?")) return;
            
            players.forEach(p => {
                p.totalMise = 0;
                p.wins = 0;
                p.losses = 0;
                p.net = 0;
                p.totalGains = 0;
                p.totalPertes = 0;
            });
            
            document.getElementById('history').innerHTML = '';
            for(let i=0; i<3; i++) document.getElementById(`bet-${i}`).value = '';
            updateUI();
        }

        // ===== HISTORIQUE =====
        function addHistory(playerId, face, isWin, bet) {
            const history = document.getElementById('history');
            const item = document.createElement('div');
            item.className = 'history-item ' + (isWin ? 'win' : 'lose');
            const name = document.getElementById(`name-${playerId}`).value || `J${playerId + 1}`;
            item.innerHTML = `
                <span>${name} | 🎲 Dé: <strong>${face}</strong></span>
                <span>${isWin ? '✅ +' + (bet * 2) + 'Ar' : '❌ −' + bet + 'Ar'}</span>
            `;
            history.insertBefore(item, history.firstChild);

            // Limiter l'historique
            if (history.children.length > 20) {
                history.removeChild(history.lastChild);
            }
        }

        // ===== SHAKE ANIMATION =====
        function shakeElement(el) {
            el.style.animation = 'none';
            el.offsetHeight; // trigger reflow
            el.style.animation = 'shake 0.4s ease';
            setTimeout(() => { el.style.animation = ''; }, 400);
        }

        // ===== SHAKE KEYFRAMES (injecté dynamiquement) =====
        const shakeStyle = document.createElement('style');
        shakeStyle.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                20% { transform: translateX(-8px); }
                40% { transform: translateX(8px); }
                60% { transform: translateX(-5px); }
                80% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(shakeStyle);

        // ===== LANCEMENT =====
        init();
    </script>
</body>
</html>
